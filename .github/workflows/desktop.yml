name: Build Desktop App (.exe)

# Builds the offline desktop app with Electron.
#   - Push a version tag (e.g. `git tag v1.0.0 && git push --tags`) to build the
#     Windows installer AND publish it as a GitHub Release you can download.
#   - Or trigger manually from the Actions tab to just get the .exe as a
#     downloadable build artifact (no release created).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create a Release when a tag is pushed

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cm-simulator-windows
          path: release/*.exe

      - name: Publish GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
